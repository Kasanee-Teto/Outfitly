<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-size: 30px;
            font-family: 'Nunito', sans-serif;
            font-weight:bold;
            background-image: linear-gradient(90deg, silver, white);
            overflow: hidden;
            align-items: center;
            justify-content: center;
            display: flex;
            flex-direction: column;
            margin: 0;
        }
        .judul{
            text-align:center;
            color:#0072ff;
            text-shadow: 5px 5px 5px black;
            margin-bottom: 50px;
        }
        .border{
            display: flex;
            border: 3px  solid black;
            justify-content: center;
            align-items: center;
            background-color: white;    
            margin: 20px 300px 300px 300px;
            height: 50vh;
            width: 65vh;
            border-radius:20px;
        }
        .input{
            padding-top:10px;
            padding-left:100px;
        }
        input[type="text"]{
            border:none;
            border-bottom: 1px solid black;
            width:400px;
        }
        input[type="password"]{
            border:none;
            border-bottom: 1px solid black;
            width: 400px;
        }
        @media (max-width: 480px){
            .judul{
                text-align:center;
                color:#0072ff;
                text-shadow: 5px 5px 5px black;
                margin-bottom: 50px;
            }
            .border{
                display: flex;
                border: 3px  solid black;
                justify-content: center;
                align-items: center;
                background-color: white;    
                margin-left: 10%;
                margin-right: 10%;
                height: 30vh;
                width: auto;
                border-radius:20px;
                padding-left: 5%;
                padding-right: 5%;
                padding-top: 2%;
                font-size: 12px;
            }
        input[type="text"]{
            border:none;
            border-bottom: 1px solid black;
            width:auto;
        }
        input[type="password"]{
            border:none;
            border-bottom: 1px solid black;
            width: auto;
        }
        .hasil{
            padding-right: 5%;
        }
        }
    </style>
</head>
<body>
    <div class="judul">Sportify</div>
    <div class="border">
            <form action="Login.html" method="post" >
                <table>
                    <tr>
                        <td><label for="username">Username</label></td>
                    </tr>
                    <tr>
                        <td class="hasil"><input type="text" name="username" id="username" required></td>
                    </tr>
                    <tr>
                        <td><label for="password">Password</label></td>
                    </tr>
                    <tr>
                        <td class="hasil"><input type="password" name="password" id="password" required></td>
                    </tr>
                    <tr>
                        <td><label for="confirmPassword">Confirm Password</label></td>
                    </tr>
                    <tr>
                        <td class="hasil"><input type="password" name="confirmPassword"  id="confirmPassword" required></td>
                    </tr>
                    <tr>
                        <td><input type="submit" value="Daftar"></td>
                    </tr>
                </table>
            </form>
        </div>
    </div>
</body>
</html>
