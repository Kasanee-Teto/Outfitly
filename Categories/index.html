<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Shop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="logo">LO<span>TUS</span></div>
    <nav>
        <a href="index.html" class="active">Home</a>
        <a href="men.html">Men</a>
        <a href="women.html">Women</a>
        <a href="kids.html">Kids</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>New Arrivals Collection</h1>
    <p>Discover your style with our best fashion products of this season.</p>
    <button>Shop Now</button>
</section>

<section class="products-section">
    <h2>Latest Products</h2>
    <div class="products">
        <div class="card">
            <img src="https://via.placeholder.com/250x300" alt="product">
            <h3>Casual Hoodie</h3>
            <p class="price">$45</p>
            <button>Add to Cart</button>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/250x300" alt="product">
            <h3>Basic T-Shirt</h3>
            <p class="price">$25</p>
            <button>Add to Cart</button>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/250x300" alt="product">
            <h3>Sport Jacket</h3>
            <p class="price">$60</p>
            <button>Add to Cart</button>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/250x300" alt="product">
            <h3>Summer Dress</h3>
            <p class="price">$70</p>
            <button>Add to Cart</button>
        </div>
    </div>
</section>

<footer>
    <p>© 2025 Fashion Shop. All Rights Reserved.</p>
</footer>

</html>
