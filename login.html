<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-image: linear-gradient(90deg, gray);
            font-size: 30px;
            font-weight: bold;
            font-family: 'Nunito', sans-serif;
            height: 100vh;  
            overflow: hidden;
            align-items: center;
            justify-content: center;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        .judul{
            text-align: center;
            justify-content: center;
            align-items: center;
            color : #0072ff;
            text-shadow: 5px 5px 5px #000000;
            margin-left: 49%;
            margin-right:49% ;
            margin-bottom: 40px;
        }
        .login{
            align-items: center;
            justify-content: center;
            border:3px solid black;
            width: 80vh;
            max-width: 800px;
            height: 40vh;
            padding-top:5%;
            margin-left: auto;
            margin-right: auto;
            background-color: white;
            color: #0072ff;
        }
        .input{
            padding-top:10px;
            padding-left: 100px;
        }
        .border{
            margin-top:10px;
            margin-bottom:10px;
            border-radius: 20px;
        }
        input[type="text"]{
            border:none;
            border-bottom: 1px solid black;
            width: 400px;
        }
        input[type="password"]{
            border:none;
            border-bottom: 1px solid black;
            width: 400px;
        }
        @media (max-width: 480px) {
            .judul {
                font-size: 32px;
                margin-bottom: 20px;
            }
            .login{
            font-size: 14px;
            border:3px solid black;
            width: auto;
            max-width: 400px;
            height: 25vh;
            padding-top:5%;
            margin-left: 10%;
            margin-right: 10%;
            background-color: white;
            color: #0072ff;
            padding: 10%;
            }
            input[type="text"],
            input[type="password"] {
                font-size: 16px;
                width:80%;
                padding-left: 30px;
            }

            input[type="submit"] {
                font-size: 10px;
                width : 50px;
                height: 20px;
                font-size: cover;
            }
            .input{
                padding-left: 3%;
                padding-right: 3%;
            }
        }
    </style>
</head>
<body>
    <div class="judul">Sportify</div>
    <div class="login">
        <div class="input">
            <form action="../louis/Main Page/Main Page.html" method="post">
                <table>
                    <tr>
                        <td><label for="Username">Username</label></td>
                    </tr>
                    <tr>
                        <td class="border"><input type="text"></td>
                    </tr>
                    <tr>
                        <td><label for="Password">Password</label></td>
                    </tr>
                    <tr>
                        <td class="border"><input type="password"></td>
                    </tr>
                    <tr>
                        <td><input type="submit" value="Masuk" ></td>
                    </tr>
                    <tr></tr>
                    <tr><td>Belum punya akun? <a href="Signup.html">Daftar disini</a></td></tr>
                </table>
            </form>
        </div>
    </div>
    
</body>
</html>
