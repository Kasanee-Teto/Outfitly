<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
</head>
<style>
    body{
        background-color: aqua;
        color : #0072ff;
        font-family: 'Nunito', sans-serif;
        overflow: hidden;
    }
    .kotak1{
        background-color: hotpink;
        font-size: 20px;
        border: 5px solid black;
        border-radius: 25px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-top : 5%;
        padding-bottom: 5%;
        padding-left: 5%;
        padding-right: 5%;
        margin-top: 5%;
        margin-left: 30%;
        margin-right: 30%;
        align-items: center;
    }
    .judul{
        font-size: 50px;
        text-align: center;
        font-weight: bold;
    }
    input[type="text"],input[type="password"]{
        border : none;
        border-bottom: 3px solid black;
        background-color: hotpink;
        padding-right: 5%;
        width: 300px;
    }
    input[type="submit"]{
        border: 3px solid black;
        background-color: hotpink;
        width: auto;
    }
    input[type="text"]:hover,input[type="password"]:hover{
        background-color: green;
    }
    @media(max-width:480px){
        .kotak1{
        height: auto;
        width: auto;
        background-color: hotpink;
        font-size: 8px;
        border: 5px solid black;
        border-radius: 25px;
        align-items: center;
        justify-content: center;
        padding-top : 10%;
        padding-left: 5%;
        padding-right: 10%;
        padding-bottom: 5%;
        margin-top: 10%;
        margin-left: 5%;
        margin-right: 5%;
        align-items: center;
    }
    .judul{
        font-size: 30px;
        text-align: center;
        font-weight: bold;
    }
    input[type="text"],input[type="password"]{
        border : none;
        border-bottom: 3px solid black;
        background-color: hotpink;
        width: 180px;
        padding-left: 5%;
        font-size: 8px;
        text-align: left;
    }
    input[type="submit"]{
        border: 3px solid black;
        background-color: hotpink;
        width: auto;
    }
    input[type="text"]:hover,input[type="password"]:hover{
        background-color: green;
    }
    }
</style>
<body>
    <div class="kotak1">
        <div class="judul">Reset Password</div>
        <form action="Login.html" method="post">
            <table>
                <tr>
                    <td>Email : </td>
                </tr>
                <tr>
                    <td><input type="text" placeholder="Masukkan Email Anda" required></td>
                </tr>
                <tr>
                    <td>Password Baru : </td>
                </tr>
                <tr>
                    <td><input type="password" placeholder="Silakan Masukkan Password Baru Anda" required></td>
                </tr>
                <tr>
                    <td>Konfirmasi Password : </td>
                </tr>
                <tr>
                    <td><input type="password" placeholder="Silakan Konfirmasi Password Baru Anda" required></td>
                </tr>
                <tr>
                    <td><input type="submit" value="Submit"></input></td>
                </tr>
            </table>
        </form>
    </div>
</body>
</html>
