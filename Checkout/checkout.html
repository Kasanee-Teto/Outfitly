<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lotus | Shopping</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font: Nunito -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Nunito', sans-serif;
			background-color: #f9fafb;
    }

    :root {
      --bs-primary: #0072ff;
    }

		 nav {
			background-color: #fff;
		 }
  </style>
</head>

<body>

  <!-- Navbar -->
	<nav class="py-5">
		<div class="container-fluid">
			<div class="row">
				<h2 class="text-primary fw-bold text-center">Checkout</h2>
			</div>
		</div>
	</nav>

  <!-- PAGE CONTENT HERE -->
  <main class="container py-5">
    <form>
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" placeholder="John Doe">
        </div>
        <div class="col-md-6">
          <label class="form-label">Phone Number</label>
          <input type="text" class="form-control" placeholder="+6281234567890">
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" placeholder="john@example.com">
        </div>
        <div class="col-12">
          <label class="form-label">Shipping Address</label>
          <textarea class="form-control" placeholder="123 Main St, City, Country"></textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label">Shipping Method</label>
          <select class="form-select">
            <option>Standard (3 - 5 days)</option>
            <option>Express (1 - 2 days)</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Payment Method</label>
          <select class="form-select">
            <option>Credit Card</option>
            <option>PayPal</option>
          </select>
        </div>
        <div class="col-12 text-end mt-4">
          <a href="payment-confirmation.html" class="btn btn-primary px-4 w-100">Place Order</a>
        </div>
      </div>
    </form>
  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
